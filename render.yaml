services:
  - type: web
    name: gaoxin-health
    runtime: node
    region: singapore
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm db:generate && pnpm build
    startCommand: pnpm render:start
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        value: file:./dev.db
