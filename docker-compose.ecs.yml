services:
  gaoxin-health:
    build:
      context: .
      target: runner
    image: gaoxin-health:ecs-demo
    container_name: gaoxin-health
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/gaoxin-health.db}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/data/gaoxin-health.db}
      APP_ENV: ${APP_ENV:-demo}
      APP_VERSION: ${APP_VERSION:-ecs-demo}
      PORT: ${PORT:-3000}
      NEXT_TELEMETRY_DISABLED: "1"
      SEED_ON_START: ${SEED_ON_START:-false}
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - gaoxin_sqlite_data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  gaoxin_sqlite_data:
